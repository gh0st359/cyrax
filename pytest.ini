[pytest]
asyncio_mode = auto
timeout = 60
markers =
    unit: fast, isolated unit tests (no I/O, no network)
    integration: tests that exercise multiple components or real I/O
    e2e: end-to-end tests requiring a live environment
    slow: tests that take more than 5 seconds
addopts = --timeout=60

[coverage:run]
source = cyrax,agents,memory,models,tools,utils,ui
omit =
    tests/*
    scripts/*
    */__init__.py
    */config.example.yaml

[coverage:report]
fail_under = 60
show_missing = true
